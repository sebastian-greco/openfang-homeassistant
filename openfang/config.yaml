name: OpenFang
version: "0.1.0"
slug: openfang
description: >-
  OpenFang — open-source Agent OS. One binary. Autonomous hands, 27+ LLM
  providers, WebChat UI, Telegram/Discord/Slack bridges and more.
url: https://github.com/RightNow-AI/openfang
arch:
  - amd64
  - aarch64
# armv7 is NOT supported: no armv7 release asset exists upstream.

startup: services
boot: auto
init: false

# Persistent storage — all OpenFang data lives here and survives updates.
map:
  - addon_config:rw

# HA Ingress — embeds the OpenFang WebChat UI inside the add-on page.
ingress: true
ingress_port: 8099
panel_title: OpenFang
panel_icon: mdi:robot-outline

# Expose the OpenFang API / WebChat directly (for external access or API clients).
ports:
  4200/tcp: 4200
ports_description:
  4200/tcp: OpenFang API + WebChat UI

# Explicit host_network: false — we use port mapping instead.
host_network: false

hassio_api: false
homeassistant_api: false

options:
  timezone: "Europe/Rome"
  gateway_port: 4200
  bind_lan: false
  log_level: "info"

schema:
  timezone: str
  gateway_port: int(1,65535)
  bind_lan: bool
  # Optional: Telegram bot token. Passed as env var TELEGRAM_BOT_TOKEN.
  telegram_bot_token: str?
  log_level: list(trace|debug|info|warn|error)?
  # Arbitrary extra env vars forwarded to openfang start.
  env_vars:
    - name: "match(^[A-Za-z_][A-Za-z0-9_]*$)"
      value: str
