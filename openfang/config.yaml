name: OpenFang
version: "0.2.16"
slug: openfang
description: >-
  OpenFang — open-source Agent OS. One binary. Autonomous hands, 27+ LLM
  providers, WebChat UI, Telegram/Discord/Slack bridges and more.
url: https://github.com/RightNow-AI/openfang
arch:
  - amd64
  - aarch64
# armv7 is NOT supported: no armv7 release asset exists upstream.

startup: services
boot: auto
init: false

# /data is always mounted by HA supervisor — no extra map entries needed.

# HA Ingress — serves the OpenFang landing page inside the add-on panel.
ingress: true
ingress_port: 8099
panel_title: OpenFang
panel_icon: mdi:robot-outline

# Port 4200 is available for direct external access but opt-in (null = disabled by default).
ports:
  4200/tcp: 4200
ports_description:
  4200/tcp: "OpenFang API + WebChat UI (requires bind_lan: true for external access)"

# Explicit host_network: false — we use port mapping instead.
host_network: false

hassio_api: false
homeassistant_api: false

options:
  timezone: "UTC"
  bind_lan: false
  log_level: "info"
  llm_provider: "github-copilot"
  llm_model: "gpt-4o"
  ha_hostname: ""
  enable_terminal: true
schema:
  timezone: str
  bind_lan: bool
  api_key: password?
  telegram_bot_token: password?
  log_level: list(trace|debug|info|warn|error)?
  llm_provider: str?
  llm_model: str?
  ha_hostname: str?
  enable_terminal: bool?
  env_vars:
    - name: match(^[A-Za-z_][A-Za-z0-9_]*$)
      value: str?
