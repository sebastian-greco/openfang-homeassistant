<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenFang</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 24px;
      background: #1a1d27;
      border-bottom: 1px solid #2a2d3a;
      flex-shrink: 0;
    }

    header svg {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.02em;
    }

    header .badge {
      margin-left: auto;
      font-size: 0.7rem;
      color: #6b7280;
      background: #2a2d3a;
      padding: 3px 8px;
      border-radius: 4px;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      gap: 16px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .hero-text p {
      font-size: 0.85rem;
      color: #6b7280;
      line-height: 1.5;
    }

    .open-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 22px;
      background: #3b82f6;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      white-space: nowrap;
      transition: background 0.15s;
    }

    .open-btn:hover { background: #2563eb; }

    .open-btn svg {
      width: 16px;
      height: 16px;
    }

    .terminal-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-top: 1px solid #2a2d3a;
    }

    .terminal-label {
      padding: 8px 16px;
      font-size: 0.75rem;
      color: #6b7280;
      background: #1a1d27;
      border-bottom: 1px solid #2a2d3a;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    iframe {
      flex: 1;
      width: 100%;
      border: none;
      background: #0d1117;
    }

    .no-terminal {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #4b5563;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <header>
    <svg viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2z"/>
      <path d="M12 8v4l3 3"/>
    </svg>
    <h1>OpenFang</h1>
    <span class="badge">Agent OS</span>
  </header>

  <div class="main">
    <div class="hero">
      <div class="hero-text">
        <p>WebChat UI is running on port 4200.<br>Click the button to open it with automatic authentication.</p>
      </div>
      <a class="open-btn" href="http://%%HOST%%:4200?token=%%API_KEY%%" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/>
          <line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        Open Web UI
      </a>
    </div>

    %%TERMINAL_SECTION%%
  </div>
</body>
</html>
